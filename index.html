const FOLDER_ID = 'ID_DE_TU_CARPETA_EN_DRIVE'; // ← reemplaza esto

function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    const folder = DriveApp.getFolderById(FOLDER_ID);

    // Guardar archivos
    const saveFile = (b64, nombre, tipo) => {
      const bytes = Utilities.base64Decode(b64);
      const blob  = Utilities.newBlob(bytes, tipo, nombre);
      return folder.createFile(blob).getUrl();
    };

    const urlId   = saveFile(data.doc_id_b64,   data.doc_id_nombre,   data.doc_id_tipo);
    const urlDisc = saveFile(data.doc_disc_b64, data.doc_disc_nombre, data.doc_disc_tipo);

    // Guardar en Sheets
    const ss = SpreadsheetApp.openById('ID_DE_TU_HOJA');
    const sheet = ss.getSheetByName('Postulaciones') || ss.insertSheet('Postulaciones');
    if (sheet.getLastRow() === 0) {
      sheet.appendRow(['Fecha','Nombre','Tipo ID','Núm. ID','Teléfono','Email',
        'Municipio','Dirección','Barrio','Contrato previo','Doc ID (link)','Cert. Discapacidad (link)']);
    }
    sheet.appendRow([
      data.timestamp, data.nombre, data.tipo_id, data.num_id,
      data.telefono, data.email, data.municipio, data.direccion,
      data.barrio, data.contrato, urlId, urlDisc
    ]);

    return ContentService
      .createTextOutput(JSON.stringify({ status: 'ok' }))
      .setMimeType(ContentService.MimeType.JSON);

  } catch(err) {
    return ContentService
      .createTextOutput(JSON.stringify({ status: 'error', message: err.message }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}
